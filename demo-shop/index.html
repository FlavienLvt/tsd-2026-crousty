<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Web Shop</title>
  <style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;color:#333;background:#f0f0f0;font-size:14px}
a{color:inherit;text-decoration:none;cursor:pointer}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
ul{list-style:none}

/* ===== LAYOUT ===== */
.container{max-width:1200px;margin:0 auto;padding:0 16px}
.page-wrapper{min-height:60vh;padding:20px 0}

/* ===== HEADER ===== */
.header-top{background:#3f4652}
.header-inner{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{color:white;font-size:1.4rem;font-weight:700;white-space:nowrap;cursor:pointer}
.logo .acc{color:#f4a81d}
.search-wrap{flex:1;display:flex;min-width:220px;max-width:480px}
.search-wrap input{flex:1;padding:8px 12px;border:none;border-radius:3px 0 0 3px;font-size:.9rem;outline:none;min-width:0}
.search-wrap button{padding:8px 18px;background:#f4a81d;border:none;color:white;border-radius:0 3px 3px 0;font-weight:700;font-size:.9rem;white-space:nowrap}
.search-wrap button:hover{background:#d4900f}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-link{color:#ccc;font-size:.85rem}
.hdr-link:hover{color:#f4a81d}
.cart-btn{display:flex;align-items:center;gap:8px;background:#f4a81d;color:white;padding:7px 14px;border-radius:3px;font-weight:700;font-size:.85rem;border:none}
.cart-btn:hover{background:#d4900f}
.cart-qty{background:white;color:#f4a81d;border-radius:50%;width:19px;height:19px;text-align:center;line-height:19px;font-size:.75rem;font-weight:700}
.header-nav{background:#4d5666}
.header-nav ul{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;gap:2px;flex-wrap:wrap}
.header-nav a{display:block;padding:9px 14px;color:#bbb;font-size:.85rem;border-bottom:2px solid transparent}
.header-nav a:hover,.header-nav a.active{color:white;border-bottom-color:#f4a81d}

/* ===== TOAST ===== */
#toast{position:fixed;top:0;left:0;right:0;z-index:9999;display:none;padding:14px 20px;text-align:center;font-size:.9rem;font-weight:500}
#toast.show{display:block;animation:fadein .25s ease}
#toast.success{background:#4caf50;color:white}
#toast.err{background:#e53935;color:white}
@keyframes fadein{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ===== BUTTONS ===== */
.btn{padding:9px 18px;border:none;border-radius:3px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s;display:inline-block;text-align:center}
.btn-primary{background:#4a90d9;color:white}.btn-primary:hover{background:#357abd}
.btn-secondary{background:#777;color:white}.btn-secondary:hover{background:#555}
.btn-success{background:#4caf50;color:white}.btn-success:hover{background:#388e3c}
.btn-danger{background:#e53935;color:white}.btn-danger:hover{background:#c62828}
.btn-outline{background:transparent;border:1px solid #ccc;color:#555}.btn-outline:hover{background:#f5f5f5}
.btn:disabled{background:#ccc!important;color:#888!important;cursor:not-allowed}
.btn-block{width:100%}
.btn-sm{padding:5px 12px;font-size:.82rem}
.btn-lg{padding:12px 28px;font-size:1rem}

/* ===== ALERTS ===== */
.alert{padding:12px 16px;border-radius:3px;margin-bottom:14px;font-size:.9rem}
.alert-error{background:#fce4e4;border:1px solid #f44336;color:#b71c1c}
.alert-success{background:#e8f5e9;border:1px solid #4caf50;color:#1b5e20}
.alert-warning{background:#fffde7;border:1px solid #ffc107;color:#827717}
.alert-info{background:#e3f2fd;border:1px solid #2196f3;color:#0d47a1}

/* ===== PAGE TITLE ===== */
.page-title{font-size:1.4rem;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #eee}
.breadcrumb{font-size:.82rem;color:#888;margin-bottom:14px}
.breadcrumb a{color:#4a90d9}
.breadcrumb .sep{margin:0 5px;color:#bbb}

/* ===== HOME / PRODUCTS ===== */
.products-page{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:start}
.sidebar{background:white;border:1px solid #ddd;border-radius:4px;padding:16px}
.sidebar h4{font-size:.82rem;font-weight:700;margin-bottom:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.cat-list a{display:block;padding:6px 10px;font-size:.88rem;border-radius:3px;color:#444;margin-bottom:2px}
.cat-list a:hover,.cat-list a.active{background:#4a90d9;color:white}
.cat-count{float:right;background:#eee;border-radius:10px;padding:1px 7px;font-size:.75rem;color:#666}
.cat-list a.active .cat-count{background:rgba(255,255,255,.3);color:white}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.product-card{background:white;border:1px solid #ddd;border-radius:4px;padding:14px;text-align:center;display:flex;flex-direction:column;transition:box-shadow .2s,transform .1s}
.product-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px)}
.product-thumb{font-size:3.5rem;padding:10px 0}
.product-name-link{font-size:.88rem;font-weight:600;color:#4a90d9;margin:6px 0 4px;display:block;line-height:1.3}
.product-name-link:hover{color:#357abd}
.product-cat-tag{font-size:.75rem;color:#999;margin-bottom:8px}
.product-price-tag{color:#e53935;font-size:1.1rem;font-weight:700;margin:6px 0 12px}
.product-card .btn{margin-top:auto}
.products-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:.85rem;color:#666}

/* ===== PRODUCT DETAIL ===== */
.product-detail{background:white;border:1px solid #ddd;border-radius:4px;padding:24px}
.product-detail-layout{display:grid;grid-template-columns:260px 1fr;gap:30px;align-items:start}
.product-detail-img-box{border:1px solid #eee;border-radius:4px;padding:20px;text-align:center;font-size:7rem;background:#fafafa}
.product-detail-title{font-size:1.35rem;font-weight:700;margin-bottom:8px}
.product-detail-price{color:#e53935;font-size:1.5rem;font-weight:700;margin-bottom:16px}
.product-detail-desc{color:#666;font-size:.9rem;line-height:1.6;margin-bottom:20px}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.qty-row label{font-weight:600;font-size:.9rem}
.qty-field{width:75px;padding:8px;text-align:center;border:1px solid #ccc;border-radius:3px;font-size:1rem}
.qty-field.field-invalid{border-color:#e53935}
.qty-error{color:#e53935;font-size:.82rem;min-height:18px;margin-bottom:10px}

/* ===== CART ===== */
.cart-wrap{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.cart-table{width:100%;border-collapse:collapse;background:white}
.cart-table th{background:#f5f5f5;padding:10px 14px;text-align:left;font-size:.85rem;border-bottom:2px solid #ddd;color:#555}
.cart-table td{padding:12px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.cart-product-name{font-weight:600;font-size:.9rem;color:#4a90d9}
.cart-qty-field{width:65px;padding:6px;text-align:center;border:1px solid #ddd;border-radius:3px}
.cart-summary{background:white;border:1px solid #ddd;border-radius:4px;padding:18px}
.cart-summary h3{font-size:1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eee}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.9rem}
.summary-total{display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:1.05rem;border-top:1px solid #ddd;margin-top:8px}
.cart-empty{background:white;border:1px solid #ddd;border-radius:4px;padding:40px;text-align:center;color:#888}

/* ===== FORMS ===== */
.form-card{background:white;border:1px solid #ddd;border-radius:4px;padding:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.88rem;font-weight:600;margin-bottom:5px;color:#444}
.form-group label .req{color:#e53935}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:3px;font-size:.9rem;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:#4a90d9}
.form-group input.field-invalid{border-color:#e53935}
.field-msg{font-size:.8rem;margin-top:4px}
.field-msg.err{color:#e53935}

/* ===== AUTH ===== */
.auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:860px;margin:0 auto}
.auth-box{background:white;border:1px solid #ddd;border-radius:4px;padding:24px}
.auth-box h2{font-size:1.1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eee}
.auth-box .info{font-size:.85rem;color:#666;margin-bottom:14px}

/* ===== CHECKOUT ===== */
.checkout-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.checkout-section{background:white;border:1px solid #ddd;border-radius:4px;padding:20px;margin-bottom:16px}
.checkout-section-title{font-size:1rem;font-weight:700;color:#4a90d9;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.shipping-option{margin-bottom:8px;padding:10px 12px;border:1px solid #ddd;border-radius:3px;display:flex;align-items:center;gap:10px;cursor:pointer}
.shipping-option:hover{background:#f9f9f9}
.shipping-option input[type=radio]{accent-color:#4a90d9}
.shipping-option label{cursor:pointer;font-size:.9rem;flex:1}
.shipping-price{font-weight:700;color:#e53935}
.guest-tabs{display:flex;margin-bottom:16px;border-bottom:2px solid #ddd}
.guest-tab{padding:10px 20px;cursor:pointer;font-size:.9rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:#777}
.guest-tab.active{color:#4a90d9;border-bottom-color:#4a90d9;font-weight:700}
.order-summary-item{display:flex;justify-content:space-between;padding:6px 0;font-size:.9rem;border-bottom:1px solid #f0f0f0}

/* ===== ORDER CONFIRMED ===== */
.order-confirmed-box{background:white;border:1px solid #ddd;border-radius:4px;padding:48px 32px;text-align:center;max-width:600px;margin:0 auto}
.confirmed-icon{font-size:4rem;margin-bottom:16px}
.confirmed-title{font-size:1.5rem;font-weight:700;color:#388e3c;margin-bottom:10px}
.confirmed-order-num{font-size:1rem;color:#555;margin-bottom:14px}
.confirmed-msg{color:#777;font-size:.9rem;margin-bottom:24px;line-height:1.6}

/* ===== ACCOUNT ===== */
.account-layout{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:start}
.account-menu a{display:block;padding:9px 14px;border:1px solid #ddd;background:white;border-radius:3px;margin-bottom:4px;font-size:.88rem;color:#444}
.account-menu a:hover,.account-menu a.active{background:#4a90d9;color:white;border-color:#4a90d9}
.account-menu a.danger{color:#e53935}
.account-menu a.danger:hover{background:#e53935;color:white;border-color:#e53935}

/* ===== FOOTER ===== */
.site-footer{background:#3f4652;color:#aaa;padding:20px;text-align:center;font-size:.82rem;margin-top:30px}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .header-inner{gap:10px}
  .search-wrap{order:3;width:100%;max-width:none}
  .products-page,.cart-wrap,.checkout-layout,.account-layout,.auth-grid{grid-template-columns:1fr}
  .product-detail-layout{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .sidebar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .sidebar h4{display:none}
}
  </style>
</head>
<body>

<div id="toast"></div>
<div id="site-header"></div>
<main id="app" class="container page-wrapper"></main>
<footer class="site-footer">
  <p>© 2026 <strong>Demo Web Shop</strong> — Developed for testing purposes only</p>
</footer>

<script>
// ============================================================
// PRODUCT CATALOG
// ============================================================
const PRODUCTS = [
  { id:1,  name:'14.1-inch Laptop',        category:'Laptops',     price:699.99,  icon:'💻', desc:'Compact 14.1-inch laptop with Intel Core i5, 8 GB RAM, 256 GB SSD. Ideal for everyday productivity.' },
  { id:2,  name:'Gaming Laptop 15.6-inch', category:'Laptops',     price:1199.99, icon:'🎮', desc:'High-performance gaming laptop with RTX 3060, 16 GB RAM, 144 Hz display, and RGB keyboard.' },
  { id:3,  name:'MacBook Pro 14-inch',     category:'Laptops',     price:1999.99, icon:'🍎', desc:'Apple MacBook Pro with M3 chip, 16 GB unified memory, 512 GB SSD, and Liquid Retina display.' },
  { id:4,  name:'Laptop Stand Adjustable', category:'Laptops',     price:49.99,   icon:'🖥️', desc:'Ergonomic adjustable aluminum stand compatible with all 11–17 inch laptops.' },
  { id:5,  name:'Samsung Galaxy S24',      category:'Phones',      price:799.99,  icon:'📱', desc:'Samsung flagship with 200 MP camera, 8 GB RAM, 256 GB storage, and 5G connectivity.' },
  { id:6,  name:'iPhone 16',               category:'Phones',      price:999.99,  icon:'📱', desc:'Apple iPhone 16 with A18 chip, ProMotion display, Dynamic Island, and 5G.' },
  { id:7,  name:'Wireless Headphones Pro', category:'Audio',       price:149.99,  icon:'🎧', desc:'Premium over-ear headphones with active noise cancellation and 30-hour battery life.' },
  { id:8,  name:'Bluetooth Speaker',       category:'Audio',       price:89.99,   icon:'🔊', desc:'Portable waterproof Bluetooth speaker with 360° surround sound and 20-hour battery.' },
  { id:9,  name:'USB-C Hub 7-in-1',        category:'Accessories', price:59.99,   icon:'🔌', desc:'Multiport hub: HDMI 4K, 3× USB-A, SD card reader, USB-C Power Delivery 100 W.' },
  { id:10, name:'Wireless Mouse',          category:'Accessories', price:39.99,   icon:'🖱️', desc:'Ergonomic wireless mouse with silent clicks, 2.4 GHz receiver, and 12-month battery.' },
  { id:11, name:'Mechanical Keyboard',     category:'Accessories', price:129.99,  icon:'⌨️', desc:'Compact TKL mechanical keyboard with Cherry MX switches and per-key RGB backlight.' },
  { id:12, name:'Laptop Bag 15-inch',      category:'Accessories', price:59.99,   icon:'👜', desc:'Water-resistant laptop bag with padded compartments for laptops up to 15.6 inches.' },
];

const CATEGORIES = ['All', 'Laptops', 'Phones', 'Audio', 'Accessories'];

// ============================================================
// STORAGE HELPERS
// ============================================================
function getUsers()       { try { return JSON.parse(localStorage.getItem('dws_users')   || '[]');   } catch { return []; } }
function saveUsers(u)     { localStorage.setItem('dws_users',   JSON.stringify(u)); }
function getCurrentUser() { try { return JSON.parse(localStorage.getItem('dws_current') || 'null'); } catch { return null; } }
function saveCurrentUser(u) { u ? localStorage.setItem('dws_current', JSON.stringify(u)) : localStorage.removeItem('dws_current'); }
function getCart()        { try { return JSON.parse(localStorage.getItem('dws_cart')    || '[]');   } catch { return []; } }
function saveCart(c)      { localStorage.setItem('dws_cart',    JSON.stringify(c)); }

function initDemoData() {
  const users = getUsers();
  if (!users.find(u => u.email === 'demo@webshop.com')) {
    users.push({
      email: 'demo@webshop.com', password: 'demo123',
      firstName: 'Demo', lastName: 'User',
      address: { firstName:'Demo', lastName:'User', address1:'123 Main Street', city:'New York', zip:'10001', country:'United States', phone:'555-0100' }
    });
    saveUsers(users);
  }
}

// ============================================================
// UTILITIES
// ============================================================
let _toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || 'success');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 4000);
}

function cartTotal()  { return getCart().reduce((s, i) => s + i.price * i.qty, 0); }
function cartCount()  { return getCart().reduce((s, i) => s + i.qty, 0); }
function fmt(n)       { return '$' + Number(n).toFixed(2); }

// ============================================================
// ROUTER
// ============================================================
function getRoute() {
  const hash = location.hash.replace('#', '') || '/';
  const [path, qs] = hash.split('?');
  const params = {};
  if (qs) qs.split('&').forEach(p => { const [k,v] = p.split('='); params[k] = decodeURIComponent(v || ''); });
  return { path, params };
}

function navigate(path) { location.hash = path; }

function route() {
  const { path, params } = getRoute();
  renderHeader();
  const app = document.getElementById('app');
  if (path === '/' || path === '/home') {
    renderHome(app, params.cat || 'All');
  } else if (path.startsWith('/product/')) {
    renderProduct(app, parseInt(path.split('/')[2]));
  } else if (path === '/search') {
    renderSearch(app, params.q || '');
  } else if (path === '/cart') {
    renderCart(app);
  } else if (path === '/login') {
    renderLogin(app);
  } else if (path === '/register') {
    renderRegister(app);
  } else if (path === '/checkout') {
    renderCheckout(app);
  } else if (path === '/order-confirmed') {
    renderOrderConfirmed(app, params.order || '?');
  } else if (path === '/account') {
    renderAccount(app, params.tab || 'info');
  } else {
    app.innerHTML = '<p>Page not found. <a href="#/">Go home</a></p>';
  }
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', () => { initDemoData(); route(); });

// ============================================================
// HEADER
// ============================================================
function renderHeader() {
  const user  = getCurrentUser();
  const count = cartCount();
  const { path, params } = getRoute();
  const searchVal = path === '/search' ? (params.q || '') : '';

  document.getElementById('site-header').innerHTML = `
    <div class="header-top">
      <div class="header-inner">
        <div class="logo" onclick="navigate('/')">Demo <span class="acc">Web Shop</span></div>
        <form class="search-wrap" onsubmit="handleSearch(event)">
          <input type="text" id="search-input" placeholder="Search products..." autocomplete="off" value="${escHtml(searchVal)}">
          <button type="submit">Search</button>
        </form>
        <div class="header-actions">
          ${user
            ? `<span class="hdr-link">Welcome, <a href="#/account" style="font-weight:700;color:#f4a81d;">${escHtml(user.email)}</a>
               &nbsp;|&nbsp;<a href="#/" onclick="logout()" class="hdr-link">Log out</a></span>`
            : `<a href="#/login" class="hdr-link">Log in</a>
               <a href="#/register" class="hdr-link">Register</a>`
          }
          <button class="cart-btn" onclick="navigate('/cart')">
            🛒 Cart <span class="cart-qty" id="cart-count">${count}</span>
          </button>
        </div>
      </div>
    </div>
    <nav class="header-nav">
      <ul>
        <li><a href="#/"                  class="${path==='/'?'active':''}">Home</a></li>
        <li><a href="#/?cat=Laptops"      class="${params.cat==='Laptops'?'active':''}">Laptops</a></li>
        <li><a href="#/?cat=Phones"       class="${params.cat==='Phones'?'active':''}">Phones</a></li>
        <li><a href="#/?cat=Audio"        class="${params.cat==='Audio'?'active':''}">Audio</a></li>
        <li><a href="#/?cat=Accessories"  class="${params.cat==='Accessories'?'active':''}">Accessories</a></li>
        ${user ? `<li><a href="#/account" class="${path==='/account'?'active':''}">My Account</a></li>` : ''}
      </ul>
    </nav>`;
}

function handleSearch(e) {
  e.preventDefault();
  const q = document.getElementById('search-input').value.trim();
  navigate('/search?q=' + encodeURIComponent(q));
}

function logout() {
  saveCurrentUser(null);
  showToast('You have successfully logged out.', 'success');
  navigate('/');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============================================================
// HOME PAGE
// ============================================================
function renderHome(app, activeCat) {
  const products = activeCat === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCat);
  const counts   = {};
  CATEGORIES.forEach(c => { counts[c] = c === 'All' ? PRODUCTS.length : PRODUCTS.filter(p => p.category === c).length; });

  app.innerHTML = `
    <div class="products-page">
      <aside class="sidebar">
        <h4>Categories</h4>
        <div class="cat-list">
          ${CATEGORIES.map(c => `
            <a href="#/?cat=${c}" class="${activeCat===c?'active':''}">
              ${c} <span class="cat-count">${counts[c]}</span>
            </a>`).join('')}
        </div>
      </aside>
      <div>
        <div class="breadcrumb">
          <a href="#/">Home</a>
          ${activeCat !== 'All' ? `<span class="sep">›</span>${activeCat}` : ''}
        </div>
        <div class="products-toolbar">
          <span>${products.length} product${products.length!==1?'s':''} found</span>
        </div>
        ${products.length === 0
          ? '<div class="alert alert-info">No products found in this category.</div>'
          : `<div class="products-grid">${products.map(productCard).join('')}</div>`
        }
      </div>
    </div>`;
}

function productCard(p) {
  return `
    <div class="product-card">
      <div class="product-thumb">${p.icon}</div>
      <a class="product-name-link" href="#/product/${p.id}">${escHtml(p.name)}</a>
      <div class="product-cat-tag">${p.category}</div>
      <div class="product-price-tag">${fmt(p.price)}</div>
      <button class="btn btn-primary btn-sm" onclick="quickAddToCart(${p.id})">Add to cart</button>
    </div>`;
}

function quickAddToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (p) addToCart(p, 1);
}

// ============================================================
// PRODUCT DETAIL
// ============================================================
function renderProduct(app, id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) { app.innerHTML = '<div class="alert alert-error">Product not found.</div>'; return; }

  app.innerHTML = `
    <div class="breadcrumb">
      <a href="#/">Home</a><span class="sep">›</span>
      <a href="#/?cat=${p.category}">${p.category}</a><span class="sep">›</span>

  if (p) addToCart(p, qty);
}

function updateCartQty(i, val) {
  const qty = parseInt(val);
  if (!qty || qty < 1) return;
  const cart = getCart(); cart[i].qty = qty; saveCart(cart);
  renderHeader();
  renderCart(document.getElementById('app'));

function removeFromCart(i) {
  const cart = getCart(); cart.splice(i, 1); saveCart(cart);
  renderHeader();
  renderCart(document.getElementById('app'));
  showToast('Item removed from cart.', 'success');
}

function clearCart() {
  saveCart([]);

  renderCart(document.getElementById('app'));

// TC-003: adds item and shows success toast
function addToCart(product, qty) {
  const cart = getCart();
  const existing = cart.find(i => i.id === product.id);
  if (existing) { existing.qty += qty; } else { cart.push({ id:product.id, name:product.name, price:product.price, qty }); }
  saveCart(cart);
  renderHeader();
  showToast('The product has been added to your shopping cart.', 'success');
}

        </p>
      </form>

function handleRegister(e) {
  e.preventDefault();
  let valid = true;
  ['firstname','lastname','email','password','confirm'].forEach(f => {
    const el = document.getElementById('err-' + f);
    if (el) el.textContent = '';
    const inp = document.getElementById('reg-' + f);
    if (inp) inp.classList.remove('field-invalid');
  });

  const firstName = document.getElementById('reg-firstname').value.trim();
  const lastName  = document.getElementById('reg-lastname').value.trim();
  const email     = document.getElementById('reg-email').value.trim();
  const password  = document.getElementById('reg-password').value;
  const confirm   = document.getElementById('reg-confirm').value;

  if (!firstName) { setFieldErr('firstname', 'First name is required.'); valid = false; }
  if (!lastName)  { setFieldErr('lastname',  'Last name is required.');  valid = false; }

  if (!email) { setFieldErr('email', 'Email is required.'); valid = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setFieldErr('email', 'Please enter a valid email address.'); valid = false; }
  else if (getUsers().find(u => u.email === email)) { setFieldErr('email', 'An account with this email already exists.'); valid = false; }

  if (!password) { setFieldErr('password', 'Password is required.'); valid = false; }
  // TC-007: minimum 6 characters
  else if (password.length < 6) { setFieldErr('password', 'Password must have at least 6 characters.'); valid = false; }

  if (password && confirm !== password) { setFieldErr('confirm', 'Passwords do not match.'); valid = false; }

  if (!valid) return;

  const users   = getUsers();
  const newUser = { email, password, firstName, lastName, address: null };
  users.push(newUser);
  saveUsers(users);
  saveCurrentUser(newUser);
  renderHeader();
  navigate('/');
  showToast('Your account has been successfully registered!', 'success');
}

function setFieldErr(field, msg) {
  const err = document.getElementById('err-' + field);
  const inp = document.getElementById('reg-' + field);
  if (err) err.textContent = msg;
  if (inp) inp.classList.add('field-invalid');
}

  return `
    <div class="form-card">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:14px;">Default Shipping Address</h2>
      ${a
        ? `<div style="background:#f9f9f9;border:1px solid #eee;border-radius:3px;padding:14px;margin-bottom:14px;font-size:.9rem;line-height:1.7;">
             ${escHtml(a.firstName)} ${escHtml(a.lastName)}<br>
             ${escHtml(a.address1)}<br>
             ${escHtml(a.city)}, ${escHtml(a.zip)}<br>
             ${escHtml(a.country)}
             ${a.phone ? '<br>'+escHtml(a.phone) : ''}
           </div>
           <button class="btn btn-outline btn-sm" onclick="showAddrForm()">Edit Address</button>`
        : `<p style="color:#888;margin-bottom:14px;">No address saved yet.</p>
           <button class="btn btn-primary btn-sm" onclick="showAddrForm()">Add Address</button>`}
      <div id="addr-form" style="display:none;margin-top:16px;">
        ${addrForm('adr', a)}
        <button class="btn btn-primary" onclick="saveAddr()">Save Address</button>
      </div>
    </div>`;
}

function showAddrForm() { document.getElementById('addr-form').style.display = ''; }

function saveAddr() {
  const user = getCurrentUser();
  user.address = {
    firstName: document.getElementById('adr-fn').value,
    lastName:  document.getElementById('adr-ln').value,
    address1:  document.getElementById('adr-addr').value,
    city:      document.getElementById('adr-city').value,
    zip:       document.getElementById('adr-zip').value,
    country:   document.getElementById('adr-country').value,
    phone:     document.getElementById('adr-phone').value,
  };
  saveCurrentUser(user);
  const users = getUsers(), idx = users.findIndex(u => u.email === user.email);
  if (idx !== -1) { users[idx] = user; saveUsers(users); }
  renderAccount(document.getElementById('app'), 'addresses');
  showToast('Address saved successfully.', 'success');
}

function accountOrders() {
  return `
    <div class="form-card">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:14px;">Order History</h2>
      <p style="color:#888;font-size:.9rem;">No orders found.</p>
    </div>`;
}
</script>
</body>
