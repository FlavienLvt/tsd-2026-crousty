<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Web Shop</title>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;color:#333;background:#f0f0f0;font-size:14px}
a{color:inherit;text-decoration:none;cursor:pointer}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
ul{list-style:none}
.container{max-width:1200px;margin:0 auto;padding:0 16px}
.page-wrapper{min-height:60vh;padding:20px 0}
.header-top{background:#3f4652}
.header-inner{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{color:white;font-size:1.4rem;font-weight:700;white-space:nowrap;cursor:pointer}
.logo .acc{color:#f4a81d}
.search-wrap{flex:1;display:flex;min-width:220px;max-width:480px}
.search-wrap input{flex:1;padding:8px 12px;border:none;border-radius:3px 0 0 3px;font-size:.9rem;outline:none;min-width:0}
.search-wrap button{padding:8px 18px;background:#f4a81d;border:none;color:white;border-radius:0 3px 3px 0;font-weight:700;font-size:.9rem;white-space:nowrap}
.search-wrap button:hover{background:#d4900f}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-link{color:#ccc;font-size:.85rem}
.hdr-link:hover{color:#f4a81d}
.cart-btn{display:flex;align-items:center;gap:8px;background:#f4a81d;color:white;padding:7px 14px;border-radius:3px;font-weight:700;font-size:.85rem;border:none}
.cart-btn:hover{background:#d4900f}
.cart-qty{background:white;color:#f4a81d;border-radius:50%;width:19px;height:19px;text-align:center;line-height:19px;font-size:.75rem;font-weight:700}
.header-nav{background:#4d5666}
.header-nav ul{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;gap:2px;flex-wrap:wrap}
.header-nav a{display:block;padding:9px 14px;color:#bbb;font-size:.85rem;border-bottom:2px solid transparent}
.header-nav a:hover,.header-nav a.active{color:white;border-bottom-color:#f4a81d}
#toast{position:fixed;top:0;left:0;right:0;z-index:9999;display:none;padding:14px 20px;text-align:center;font-size:.9rem;font-weight:500}
#toast.show{display:block;animation:fadein .25s ease}
#toast.success{background:#4caf50;color:white}
#toast.err{background:#e53935;color:white}
@keyframes fadein{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.btn{padding:9px 18px;border:none;border-radius:3px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s;display:inline-block;text-align:center}
.btn-primary{background:#4a90d9;color:white}.btn-primary:hover{background:#357abd}
.btn-secondary{background:#777;color:white}.btn-secondary:hover{background:#555}
.btn-success{background:#4caf50;color:white}.btn-success:hover{background:#388e3c}
.btn-danger{background:#e53935;color:white}.btn-danger:hover{background:#c62828}
.btn-outline{background:transparent;border:1px solid #ccc;color:#555}.btn-outline:hover{background:#f5f5f5}
.btn:disabled{background:#ccc!important;color:#888!important;cursor:not-allowed}
.btn-block{width:100%}.btn-sm{padding:5px 12px;font-size:.82rem}.btn-lg{padding:12px 28px;font-size:1rem}
.alert{padding:12px 16px;border-radius:3px;margin-bottom:14px;font-size:.9rem}
.alert-error{background:#fce4e4;border:1px solid #f44336;color:#b71c1c}
.alert-success{background:#e8f5e9;border:1px solid #4caf50;color:#1b5e20}
.alert-warning{background:#fffde7;border:1px solid #ffc107;color:#827717}
.alert-info{background:#e3f2fd;border:1px solid #2196f3;color:#0d47a1}
.page-title{font-size:1.4rem;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #eee}
.breadcrumb{font-size:.82rem;color:#888;margin-bottom:14px}
.breadcrumb a{color:#4a90d9}
.breadcrumb .sep{margin:0 5px;color:#bbb}
.products-page{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:start}
.sidebar{background:white;border:1px solid #ddd;border-radius:4px;padding:16px}
.sidebar h4{font-size:.82rem;font-weight:700;margin-bottom:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.cat-list a{display:block;padding:6px 10px;font-size:.88rem;border-radius:3px;color:#444;margin-bottom:2px}
.cat-list a:hover,.cat-list a.active{background:#4a90d9;color:white}
.cat-count{float:right;background:#eee;border-radius:10px;padding:1px 7px;font-size:.75rem;color:#666}
.cat-list a.active .cat-count{background:rgba(255,255,255,.3);color:white}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.product-card{background:white;border:1px solid #ddd;border-radius:4px;padding:14px;text-align:center;display:flex;flex-direction:column;transition:box-shadow .2s,transform .1s}
.product-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px)}
.product-thumb{font-size:3.5rem;padding:10px 0}
.product-name-link{font-size:.88rem;font-weight:600;color:#4a90d9;margin:6px 0 4px;display:block;line-height:1.3}
.product-name-link:hover{color:#357abd}
.product-cat-tag{font-size:.75rem;color:#999;margin-bottom:8px}
.product-price-tag{color:#e53935;font-size:1.1rem;font-weight:700;margin:6px 0 12px}
.product-card .btn{margin-top:auto}
.products-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:.85rem;color:#666}
.product-detail{background:white;border:1px solid #ddd;border-radius:4px;padding:24px}
.product-detail-layout{display:grid;grid-template-columns:260px 1fr;gap:30px;align-items:start}
.product-detail-img-box{border:1px solid #eee;border-radius:4px;padding:20px;text-align:center;font-size:7rem;background:#fafafa}
.product-detail-title{font-size:1.35rem;font-weight:700;margin-bottom:8px}
.product-detail-price{color:#e53935;font-size:1.5rem;font-weight:700;margin-bottom:16px}
.product-detail-desc{color:#666;font-size:.9rem;line-height:1.6;margin-bottom:20px}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.qty-row label{font-weight:600;font-size:.9rem}
.qty-field{width:75px;padding:8px;text-align:center;border:1px solid #ccc;border-radius:3px;font-size:1rem}
.qty-field.field-invalid{border-color:#e53935}
.qty-error{color:#e53935;font-size:.82rem;min-height:18px;margin-bottom:10px}
.cart-wrap{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.cart-table{width:100%;border-collapse:collapse;background:white}
.cart-table th{background:#f5f5f5;padding:10px 14px;text-align:left;font-size:.85rem;border-bottom:2px solid #ddd;color:#555}
.cart-table td{padding:12px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.cart-product-name{font-weight:600;font-size:.9rem;color:#4a90d9}
.cart-qty-field{width:65px;padding:6px;text-align:center;border:1px solid #ddd;border-radius:3px}
.cart-summary{background:white;border:1px solid #ddd;border-radius:4px;padding:18px}
.cart-summary h3{font-size:1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eee}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.9rem}
.summary-total{display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:1.05rem;border-top:1px solid #ddd;margin-top:8px}
.cart-empty{background:white;border:1px solid #ddd;border-radius:4px;padding:40px;text-align:center;color:#888}
.form-card{background:white;border:1px solid #ddd;border-radius:4px;padding:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.88rem;font-weight:600;margin-bottom:5px;color:#444}
.form-group label .req{color:#e53935}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:3px;font-size:.9rem;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:#4a90d9}
.form-group input.field-invalid{border-color:#e53935}
.field-msg{font-size:.8rem;margin-top:4px}
.field-msg.err{color:#e53935}
.auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:860px;margin:0 auto}
.auth-box{background:white;border:1px solid #ddd;border-radius:4px;padding:24px}
.auth-box h2{font-size:1.1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eee}
.auth-box .info{font-size:.85rem;color:#666;margin-bottom:14px}
.checkout-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.checkout-section{background:white;border:1px solid #ddd;border-radius:4px;padding:20px;margin-bottom:16px}
.checkout-section-title{font-size:1rem;font-weight:700;color:#4a90d9;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.shipping-option{margin-bottom:8px;padding:10px 12px;border:1px solid #ddd;border-radius:3px;display:flex;align-items:center;gap:10px;cursor:pointer}
.shipping-option:hover{background:#f9f9f9}
.shipping-option input[type=radio]{accent-color:#4a90d9}
.shipping-option label{cursor:pointer;font-size:.9rem;flex:1}
.shipping-price{font-weight:700;color:#e53935}
.guest-tabs{display:flex;margin-bottom:16px;border-bottom:2px solid #ddd}
.guest-tab{padding:10px 20px;cursor:pointer;font-size:.9rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:#777}
.guest-tab.active{color:#4a90d9;border-bottom-color:#4a90d9;font-weight:700}
.order-summary-item{display:flex;justify-content:space-between;padding:6px 0;font-size:.9rem;border-bottom:1px solid #f0f0f0}
.order-confirmed-box{background:white;border:1px solid #ddd;border-radius:4px;padding:48px 32px;text-align:center;max-width:600px;margin:0 auto}
.confirmed-icon{font-size:4rem;margin-bottom:16px}
.confirmed-title{font-size:1.5rem;font-weight:700;color:#388e3c;margin-bottom:10px}
.confirmed-order-num{font-size:1rem;color:#555;margin-bottom:14px}
.confirmed-msg{color:#777;font-size:.9rem;margin-bottom:24px;line-height:1.6}
.account-layout{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:start}
.account-menu a{display:block;padding:9px 14px;border:1px solid #ddd;background:white;border-radius:3px;margin-bottom:4px;font-size:.88rem;color:#444}
.account-menu a:hover,.account-menu a.active{background:#4a90d9;color:white;border-color:#4a90d9}
.account-menu a.danger{color:#e53935}
.account-menu a.danger:hover{background:#e53935;color:white;border-color:#e53935}
.site-footer{background:#3f4652;color:#aaa;padding:20px;text-align:center;font-size:.82rem;margin-top:30px}
@media(max-width:768px){
  .header-inner{gap:10px}
  .search-wrap{order:3;width:100%;max-width:none}
  .products-page,.cart-wrap,.checkout-layout,.account-layout,.auth-grid{grid-template-columns:1fr}
  .product-detail-layout{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .sidebar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .sidebar h4{display:none}
}
  </style>
</head>
<body>
<div id="toast"></div>
<div id="site-header"></div>
<main id="app" class="container page-wrapper"></main>
<footer class="site-footer">
  <p>&copy; 2026 <strong>Demo Web Shop</strong> &mdash; For testing purposes only</p>
</footer>
<script>
// ============================================================
// STATE  (auth cached in localStorage; data lives in the API)
// ============================================================
function getCurrentUser(){ try{return JSON.parse(localStorage.getItem('dws_user')||'null')}catch{return null} }
function saveCurrentUser(u){ u ? localStorage.setItem('dws_user',JSON.stringify(u)) : localStorage.removeItem('dws_user') }
function getSessionId(){
  let s=localStorage.getItem('dws_sid');
  if(!s){s='sess_'+Math.random().toString(36).substr(2,9);localStorage.setItem('dws_sid',s)}
  return s;
}
function getCachedCount(){ return parseInt(localStorage.getItem('dws_cc')||'0') }
function setCachedCount(n){ localStorage.setItem('dws_cc',String(n)) }

// ============================================================
// API HELPER
// ============================================================
async function api(method, path, body){
  const res = await fetch(path, {
    method,
    headers:{'Content-Type':'application/json'},
    ...(body!==undefined && {body:JSON.stringify(body)})
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    const e=new Error(data.message||`HTTP ${res.status}`);
    e.status=res.status; throw e;
  }
  return data;
}

// ============================================================
// PRODUCT CACHE
// ============================================================
let _products=null;
async function loadProducts(){ if(!_products) _products=await api('GET','/products'); return _products; }
async function findProduct(id){ return (await loadProducts()).find(p=>p.id===id); }

// ============================================================
// CART API
// ============================================================
async function fetchCart(){
  const items=await api('GET',`/cart?sessionId=${getSessionId()}`);
  setCachedCount(items.reduce((s,i)=>s+i.qty,0));
  return items;
}
async function refreshBadge(){
  const items=await fetchCart();
  const el=document.getElementById('cart-count');
  if(el) el.textContent=items.reduce((s,i)=>s+i.qty,0);
}
async function addToCart(product, qty){
  const sid=getSessionId(), user=getCurrentUser();
  const items=await fetchCart();
  const ex=items.find(i=>i.productId===product.id);
  if(ex){ await api('PUT',`/cart/${ex.id}`,{...ex,qty:ex.qty+qty}); }
  else   { await api('POST','/cart',{sessionId:sid,userId:user?.id||null,productId:product.id,name:product.name,price:product.price,qty}); }
  await refreshBadge();
  showToast('The product has been added to your shopping cart.','success');
}
async function clearCart(){
  const items=await fetchCart();
  await Promise.all(items.map(i=>api('DELETE',`/cart/${i.id}`)));
  setCachedCount(0);
  const el=document.getElementById('cart-count'); if(el) el.textContent=0;
}

// ============================================================
// UTILS
// ============================================================
let _tt;
function showToast(msg,type){ const e=document.getElementById('toast'); e.textContent=msg; e.className='show '+(type||'success'); clearTimeout(_tt); _tt=setTimeout(()=>{e.className=''},4000); }
function fmt(n){ return '$'+Number(n).toFixed(2); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function serverDown(app){ app.innerHTML=`<div class="alert alert-error" style="max-width:600px;margin:40px auto;"><strong>Cannot connect to the API server.</strong><br><br>Start it first:<br><code style="display:inline-block;background:#f8f8f8;padding:6px 10px;border-radius:3px;margin-top:8px;">cd demo-shop &amp;&amp; npm install &amp;&amp; npm start</code><br><br>Then open: <a href="http://localhost:3001" style="color:#4a90d9;">http://localhost:3001</a></div>`; }

// ============================================================
// ROUTER
// ============================================================
function getRoute(){ const h=location.hash.replace('#','')||'/'; const[path,qs]=h.split('?'); const p={}; if(qs) qs.split('&').forEach(x=>{const[k,v]=x.split('=');p[k]=decodeURIComponent(v||'')}); return{path,params:p}; }
function navigate(path){ location.hash=path; }

async function route(){
  renderHeader();
  const app=document.getElementById('app');
  app.innerHTML='<p style="padding:30px 0;color:#aaa;text-align:center;">Loading...</p>';
  const{path,params}=getRoute();
  try{
    if(path==='/'||path==='/home')          await renderHome(app,params.cat||'All');
    else if(path.startsWith('/product/'))   await renderProduct(app,parseInt(path.split('/')[2]));
    else if(path==='/search')               await renderSearch(app,params.q||'');
    else if(path==='/cart')                 await renderCart(app);
    else if(path==='/login')                renderLogin(app);
    else if(path==='/register')             renderRegister(app);
    else if(path==='/checkout')             await renderCheckout(app);
    else if(path==='/order-confirmed')      renderOrderConfirmed(app,params.order||'?');
    else if(path==='/account')              await renderAccount(app,params.tab||'info');
    else app.innerHTML='<p>Page not found. <a href="#/">Go home</a></p>';
  }catch(err){
    if(err instanceof TypeError) serverDown(app);
    else app.innerHTML=`<div class="alert alert-error">${esc(err.message)}</div>`;
  }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',route);
window.addEventListener('DOMContentLoaded',route);

// ============================================================
// HEADER
// ============================================================
function renderHeader(){
  const user=getCurrentUser(), count=getCachedCount();
  const{path,params}=getRoute(), sq=path==='/search'?(params.q||''):'';
  document.getElementById('site-header').innerHTML=`
    <div class="header-top"><div class="header-inner">
      <div class="logo" onclick="navigate('/')">Demo <span class="acc">Web Shop</span></div>
      <form class="search-wrap" onsubmit="doSearch(event)">
        <input type="text" id="search-input" placeholder="Search products..." autocomplete="off" value="${esc(sq)}">
        <button type="submit">Search</button>
      </form>
      <div class="header-actions">
        ${user
          ?`<span class="hdr-link">Welcome, <a href="#/account" style="font-weight:700;color:#f4a81d;">${esc(user.email)}</a>
             &nbsp;|&nbsp;<a href="#/" class="hdr-link" onclick="doLogout()">Log out</a></span>`
          :`<a href="#/login" class="hdr-link">Log in</a>
            <a href="#/register" class="hdr-link">Register</a>`}
        <button class="cart-btn" onclick="navigate('/cart')">
          Cart <span class="cart-qty" id="cart-count">${count}</span>
        </button>
      </div>
    </div></div>
    <nav class="header-nav"><ul>
      <li><a href="#/"                 class="${path==='/'&&!params.cat?'active':''}">Home</a></li>
      <li><a href="#/?cat=Laptops"     class="${params.cat==='Laptops'?'active':''}">Laptops</a></li>
      <li><a href="#/?cat=Phones"      class="${params.cat==='Phones'?'active':''}">Phones</a></li>
      <li><a href="#/?cat=Audio"       class="${params.cat==='Audio'?'active':''}">Audio</a></li>
      <li><a href="#/?cat=Accessories" class="${params.cat==='Accessories'?'active':''}">Accessories</a></li>
      ${user?`<li><a href="#/account" class="${path==='/account'?'active':''}">My Account</a></li>`:''}
    </ul></nav>`;
}
function doSearch(e){ e.preventDefault(); navigate('/search?q='+encodeURIComponent(document.getElementById('search-input').value.trim())); }
function doLogout(){ saveCurrentUser(null); showToast('You have successfully logged out.','success'); }

// ============================================================
// HOME
// ============================================================
const CATS=['All','Laptops','Phones','Audio','Accessories'];
async function renderHome(app,activeCat){
  const products=await loadProducts();
  const filtered=activeCat==='All'?products:products.filter(p=>p.category===activeCat);
  const counts={}; CATS.forEach(c=>{counts[c]=c==='All'?products.length:products.filter(p=>p.category===c).length});
  app.innerHTML=`
    <div class="products-page">
      <aside class="sidebar">
        <h4>Categories</h4>
        <div class="cat-list">
          ${CATS.map(c=>`<a href="#/?cat=${c}" class="${activeCat===c?'active':''}">${c} <span class="cat-count">${counts[c]}</span></a>`).join('')}
        </div>
      </aside>
      <div>
        <div class="breadcrumb"><a href="#/">Home</a>${activeCat!=='All'?`<span class="sep">›</span>${activeCat}`:''}</div>
        <div class="products-toolbar"><span>${filtered.length} product${filtered.length!==1?'s':''} found</span></div>
        ${filtered.length===0
          ?'<div class="alert alert-info">No products in this category.</div>'
          :`<div class="products-grid">${filtered.map(productCard).join('')}</div>`}
      </div>
    </div>`;
}
function productCard(p){ return `
  <div class="product-card">
    <div class="product-thumb">${p.icon}</div>
    <a class="product-name-link" href="#/product/${p.id}">${esc(p.name)}</a>
    <div class="product-cat-tag">${p.category}</div>
    <div class="product-price-tag">${fmt(p.price)}</div>
    <button class="btn btn-primary btn-sm" onclick="quickAdd(${p.id},event)">Add to cart</button>
  </div>`; }
async function quickAdd(id,e){ const btn=e.target; btn.disabled=true; try{ await addToCart(await findProduct(id),1); }finally{ btn.disabled=false; } }

// ============================================================
// PRODUCT DETAIL
// ============================================================
async function renderProduct(app,id){
  const p=await findProduct(id);
  if(!p){app.innerHTML='<div class="alert alert-error">Product not found.</div>';return;}
  app.innerHTML=`
    <div class="breadcrumb"><a href="#/">Home</a><span class="sep">›</span><a href="#/?cat=${p.category}">${p.category}</a><span class="sep">›</span>${esc(p.name)}</div>
    <div class="product-detail">
      <div class="product-detail-layout">
        <div class="product-detail-img-box">${p.icon}</div>
        <div>
          <h1 class="product-detail-title">${esc(p.name)}</h1>
          <div class="product-detail-price">${fmt(p.price)}</div>
          <p class="product-detail-desc">${esc(p.desc)}</p>
          <div class="qty-row"><label for="qty-field">Qty:</label><input type="number" id="qty-field" class="qty-field" value="1"></div>
          <div id="qty-msg" class="qty-error"></div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary btn-lg" id="add-btn" onclick="handleAddToCart(${p.id})">Add to cart</button>
            <button class="btn btn-outline btn-lg" onclick="history.back()">Back</button>
          </div>
        </div>
      </div>
    </div>`;
}
async function handleAddToCart(id){
  const qi=document.getElementById('qty-field'), qm=document.getElementById('qty-msg'), qty=parseInt(qi.value);
  if(isNaN(qty)||qty<=0){ // TC-008
    qm.textContent='Quantity must be greater than 0.'; qi.classList.add('field-invalid'); return;
  }
  qm.textContent=''; qi.classList.remove('field-invalid');
  const btn=document.getElementById('add-btn'); btn.disabled=true;
  try{ await addToCart(await findProduct(id),qty); }
  catch(err){ qm.textContent=err.message; }
  finally{ btn.disabled=false; }
}

  app.innerHTML=`
    <h1 class="page-title">Shopping Cart</h1>
    <div class="cart-wrap">
      <div>
        <table class="cart-table">

                <td>${fmt(item.price)}</td>
                <td><input type="number" class="cart-qty-field" value="${item.qty}" min="1" onchange="updateQty(${item.id},this.value,'${encodeURIComponent(JSON.stringify(item))}')"></td>
                <td>${fmt(item.price*item.qty)}</td>
                <td><button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">Remove</button></td>
              </tr>`).join('')}

        </table>
        <div style="margin-top:14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">
          <a href="#/" class="btn btn-outline">Continue Shopping</a>
          <button class="btn btn-secondary" onclick="doClearCart()">Clear Cart</button>
        </div>
      </div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${ship===0?'FREE':fmt(ship)}</span></div>
        <div class="summary-total"><span>Total</span><span>${fmt(tot)}</span></div>
        <button class="btn btn-success btn-block btn-lg" style="margin-top:16px;" onclick="navigate('/checkout')">Checkout →</button>
        <p style="font-size:.78rem;color:#999;text-align:center;margin-top:8px;">Free shipping on orders over $50</p>

}
async function updateQty(cartId,val,itemJson){
  const qty=parseInt(val); if(!qty||qty<1) return;
  const item=JSON.parse(decodeURIComponent(itemJson));
  await api('PUT',`/cart/${cartId}`,{...item,qty});
  await refreshBadge(); await renderCart(document.getElementById('app'));
}
async function removeItem(id){ await api('DELETE',`/cart/${id}`); await refreshBadge(); await renderCart(document.getElementById('app')); showToast('Item removed.','success'); }
async function doClearCart(){ await clearCart(); await renderCart(document.getElementById('app')); }

function renderRegister(app){
  if(getCurrentUser()){navigate('/account');return;}
  app.innerHTML=`
    <div class="breadcrumb"><a href="#/">Home</a><span class="sep">›</span>Register</div>
    <h1 class="page-title">Create Account</h1>
    <div class="form-card" style="max-width:540px;">
      <div id="reg-alert"></div>
      <form onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group"><label>First name <span class="req">*</span></label><input type="text" id="reg-fn" placeholder="First name"><div class="field-msg err" id="err-fn"></div></div>
          <div class="form-group"><label>Last name <span class="req">*</span></label><input type="text" id="reg-ln" placeholder="Last name"><div class="field-msg err" id="err-ln"></div></div>
        </div>
        <div class="form-group"><label>Email <span class="req">*</span></label><input type="email" id="reg-email" placeholder="Email"><div class="field-msg err" id="err-email"></div></div>
        <div class="form-group"><label>Password <span class="req">*</span></label><input type="password" id="reg-pwd" placeholder="At least 6 characters" autocomplete="new-password"><div class="field-msg err" id="err-pwd"></div></div>
        <div class="form-group"><label>Confirm password <span class="req">*</span></label><input type="password" id="reg-conf" placeholder="Repeat password" autocomplete="new-password"><div class="field-msg err" id="err-conf"></div></div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
        <p style="margin-top:12px;font-size:.82rem;color:#888;">Already registered? <a href="#/login" style="color:#4a90d9;">Log in</a></p>
      </form>
    </div>`;
}
async function handleRegister(e){
  e.preventDefault();
  ['fn','ln','email','pwd','conf'].forEach(f=>{const el=document.getElementById('err-'+f);if(el)el.textContent='';const i=document.getElementById('reg-'+f);if(i)i.classList.remove('field-invalid')});
  const fn=document.getElementById('reg-fn').value.trim(), ln=document.getElementById('reg-ln').value.trim();
  const email=document.getElementById('reg-email').value.trim(), pwd=document.getElementById('reg-pwd').value, conf=document.getElementById('reg-conf').value;
  let ok=true;
  if(!fn){setFErr('fn','First name is required.');ok=false;}
  if(!ln){setFErr('ln','Last name is required.');ok=false;}
  if(!email){setFErr('email','Email is required.');ok=false;}
  if(!pwd){setFErr('pwd','Password is required.');ok=false;}
  else if(pwd.length<6){setFErr('pwd','Password must have at least 6 characters.');ok=false;} // TC-007
  if(pwd&&conf!==pwd){setFErr('conf','Passwords do not match.');ok=false;}
  if(!ok) return;
  const btn=e.target.querySelector('button[type=submit]'); btn.disabled=true;
  try{
    const data=await api('POST','/auth/register',{firstName:fn,lastName:ln,email,password:pwd});
    saveCurrentUser(data.user); renderHeader(); navigate('/');
    showToast('Account created successfully!','success');
  }catch(err){
    if(err.status===409) setFErr('email',err.message);
    else document.getElementById('reg-alert').innerHTML=`<div class="alert alert-error">${esc(err.message)}</div>`;
  }finally{ btn.disabled=false; }
}
function setFErr(f,msg){ const e=document.getElementById('err-'+f),i=document.getElementById('reg-'+f); if(e)e.textContent=msg; if(i)i.classList.add('field-invalid'); }

async function renderCheckout(app){
  const cart=await fetchCart(), user=getCurrentUser();
  if(cart.length===0){ // TC-006

            <div id="wrap-l" style="display:none;">

      <h1 class="page-title">Checkout</h1>
      <div class="checkout-layout">

function switchTab(t){ document.getElementById('tab-g').className='guest-tab'+(t==='g'?' active':''); document.getElementById('tab-l').className='guest-tab'+(t==='l'?' active':''); document.getElementById('wrap-g').style.display=t==='g'?'':'none'; document.getElementById('wrap-l').style.display=t==='l'?'':'none'; }
async function coLogin(){ const em=document.getElementById('co-em').value.trim(),pw=document.getElementById('co-pw').value; try{ const d=await api('POST','/auth/login',{email:em,password:pw}); saveCurrentUser(d.user); renderHeader(); await renderCheckout(document.getElementById('app')); }catch(err){ document.getElementById('co-login-alert').innerHTML=`<div class="alert alert-error">${esc(err.message)}</div>`; } }
function getAddr(pfx){ const g=id=>document.getElementById(pfx+'-'+id)?.value.trim(); const fn=g('fn'),ln=g('ln'),em=g('em'),addr=g('addr'),city=g('city'),zip=g('zip'); if(!fn||!ln||!em||!addr||!city||!zip) return null; return{firstName:fn,lastName:ln,email:em,address1:addr,city,zip,country:document.getElementById(pfx+'-country')?.value||'',phone:document.getElementById(pfx+'-phone')?.value||''}; }
async function placeOrder(billing){ const cart=await fetchCart(), user=getCurrentUser(), sub=cart.reduce((s,i)=>s+i.price*i.qty,0), sh=sub>=50?0:5.99, ship=document.querySelector('input[name=shipping]:checked')?.value||'standard'; const order=await api('POST','/orders',{sessionId:getSessionId(),userId:user?.id||null,customerEmail:billing.email,billingAddress:billing,shippingMethod:ship,items:cart.map(i=>({productId:i.productId,name:i.name,price:i.price,qty:i.qty})),subtotal:sub,shippingCost:sh,total:sub+sh,status:'confirmed',createdAt:new Date().toISOString()}); await clearCart(); navigate('/order-confirmed?order='+order.id); }
async function confirmGuest(){ const addr=getAddr('g'); if(!addr){document.getElementById('co-alert').innerHTML='<div class="alert alert-error">Please fill in all required fields.</div>';return;} const btn=document.getElementById('confirm-btn'); btn.disabled=true; try{await placeOrder(addr);}catch(err){document.getElementById('co-alert').innerHTML=`<div class="alert alert-error">${esc(err.message)}</div>`;btn.disabled=false;} }
async function confirmRegistered(){ const addr=getAddr('b'); if(!addr){document.getElementById('co-alert').innerHTML='<div class="alert alert-error">Please fill in all required fields.</div>';return;} const btn=document.getElementById('confirm-btn'); btn.disabled=true; try{ const user=getCurrentUser(); if(user){const{email:_,...addrOnly}=addr;await api('PATCH',`/users/${user.id}`,{address:addrOnly});saveCurrentUser({...user,address:addrOnly});} await placeOrder(addr); }catch(err){document.getElementById('co-alert').innerHTML=`<div class="alert alert-error">${esc(err.message)}</div>`;btn.disabled=false;} }

async function renderAccount(app,tab){
  const user=getCurrentUser(); if(!user){navigate('/login');return;}

  if(tab==='info') content=accInfoHtml(user);
  else if(tab==='addresses') content=accAddrHtml(user);
  else if(tab==='orders') content=await accOrdersHtml(user);
  else content=accInfoHtml(user);
  app.innerHTML=`
    <div class="breadcrumb"><a href="#/">Home</a><span class="sep">›</span>My Account</div>
    <h1 class="page-title">My Account</h1>
    <div class="account-layout">
      <div class="account-menu">
        <a href="#/account?tab=info"      class="${tab==='info'?'active':''}">Account Info</a>
        <a href="#/account?tab=addresses" class="${tab==='addresses'?'active':''}">Address Book</a>
        <a href="#/account?tab=orders"    class="${tab==='orders'?'active':''}">Order History</a>
        <a href="#/" onclick="doLogout()" class="danger">Log Out</a>
      </div>
      <div>${content}</div>

}
function accInfoHtml(u){ return `<div class="form-card"><h2 style="font-size:1rem;font-weight:700;margin-bottom:14px;">Account Details</h2><div class="form-group"><label>First Name</label><input type="text" id="acc-fn" value="${esc(u.firstName||'')}"></div><div class="form-group"><label>Last Name</label><input type="text" id="acc-ln" value="${esc(u.lastName||'')}"></div><div class="form-group"><label>Email</label><input value="${esc(u.email)}" readonly style="background:#f5f5f5;width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:3px;"></div><button class="btn btn-primary" onclick="saveAccInfo()">Save Changes</button></div>`; }
async function saveAccInfo(){ const u=getCurrentUser(),fn=document.getElementById('acc-fn').value,ln=document.getElementById('acc-ln').value; try{await api('PATCH',`/users/${u.id}`,{firstName:fn,lastName:ln});saveCurrentUser({...u,firstName:fn,lastName:ln});renderHeader();showToast('Saved.','success');}catch(e){showToast(e.message,'err');} }
function accAddrHtml(u){ const a=u.address; return `<div class="form-card"><h2 style="font-size:1rem;font-weight:700;margin-bottom:14px;">Default Shipping Address</h2>${a?`<div style="background:#f9f9f9;border:1px solid #eee;border-radius:3px;padding:14px;margin-bottom:14px;font-size:.9rem;line-height:1.7;">${esc(a.firstName)} ${esc(a.lastName)}<br>${esc(a.address1)}<br>${esc(a.city)}, ${esc(a.zip)}<br>${esc(a.country)}${a.phone?'<br>'+esc(a.phone):''}</div><button class="btn btn-outline btn-sm" onclick="showAddrForm()">Edit</button>`:`<p style="color:#888;margin-bottom:14px;">No address saved.</p><button class="btn btn-primary btn-sm" onclick="showAddrForm()">Add</button>`}<div id="addr-form" style="display:none;margin-top:16px;">${addrForm('adr',a)}<button class="btn btn-primary" onclick="saveAddr()">Save Address</button></div></div>`; }
function showAddrForm(){ document.getElementById('addr-form').style.display=''; }
async function saveAddr(){ const u=getCurrentUser(),d=getAddr('adr'); if(!d){showToast('Fill required fields.','err');return;} const{email:_,...addr}=d; try{await api('PATCH',`/users/${u.id}`,{address:addr});saveCurrentUser({...u,address:addr});await renderAccount(document.getElementById('app'),'addresses');showToast('Address saved.','success');}catch(e){showToast(e.message,'err');} }
async function accOrdersHtml(u){ const orders=await api('GET',`/orders?userId=${u.id}`); if(!orders.length) return `<div class="form-card"><h2 style="font-size:1rem;font-weight:700;margin-bottom:14px;">Order History</h2><p style="color:#888;">No orders found.</p></div>`; return `<div class="form-card"><h2 style="font-size:1rem;font-weight:700;margin-bottom:14px;">Order History</h2><table class="cart-table"><thead><tr><th>Order #</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr></thead><tbody>${orders.map(o=>`<tr><td>#${o.id}</td><td>${o.createdAt?new Date(o.createdAt).toLocaleDateString():'—'}</td><td>${(o.items||[]).length}</td><td>${fmt(o.total||0)}</td><td>${o.status||'confirmed'}</td></tr>`).join('')}</tbody></table></div>`; }
</script>
